<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام عن نتيجة الطالب</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal,sans-serif;}
body{background: linear-gradient(to bottom, #F4F6F7, #D9E2EC); text-align:center;}
header{background:#1A374D;color:white;padding:50px 20px 20px 20px;position:relative;box-shadow:0 4px 8px rgba(0,0,0,0.2);}
header h1{font-size:26px;margin-top:20px;text-shadow:1px 1px 3px rgba(0,0,0,0.3);}
.exit-btn{position:absolute;right:20px;top:20px;padding:5px 12px;background:#e53935;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.container{padding:30px 20px; display:flex; flex-direction:column; align-items:center;}
table{width:100%;border-collapse:collapse;margin-top:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
th,td{border:1px solid #1A374D;padding:8px;text-align:center;}
th{background:#1A374D;color:white;}
tr:nth-child(even){background:#f2f2f2;}

label{display:block;margin-top:15px;font-weight:bold;}
input, select{padding:10px;margin-top:5px;width:80%;max-width:300px;border-radius:8px;border:1px solid #ccc;}

button.submit-btn{
padding:12px 25px;margin-top:15px;
background:#1A374D;color:white;border:none;
border-radius:12px;cursor:pointer;font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>استعلام عن نتيجة الطالب</h1>
<button class="exit-btn" onclick="window.history.back()">رجوع</button>
</header>

<div class="container">

  <label>اختر الصف:</label>
  <select id="classSelect">
    <option value="الروضة">الروضة</option>
    <option value="الأول">الأول</option>
    <option value="الثاني">الثاني</option>
    <option value="الثالث">الثالث</option>
    <option value="الرابع">الرابع</option>
    <option value="الخامس">الخامس</option>
    <option value="السادس">السادس</option>
    <option value="السابع">السابع</option>
    <option value="الثامن">الثامن</option>
    <option value="التاسع">التاسع</option>
    <option value="الثانوي الأول">الثانوي الأول</option>
    <option value="الثانوي الثاني">الثانوي الثاني</option>
    <option value="الثانوي الثالث">الثانوي الثالث</option>
  </select>

  <label>أدخل اسم الطالب:</label>
  <input type="text" id="studentName" placeholder="أدخل الاسم بالكامل">

  <button class="submit-btn" onclick="getStudentResult()">عرض النتيجة</button>

</div>

<div class="container" id="results-container"></div>

<script>
const jsonURL = "students.json"; // 🔥 الملف المحلي

function getStudentResult() {

  const name = document.getElementById('studentName').value.trim();
  const className = document.getElementById('classSelect').value;

  if(name === "") {
    alert("الرجاء إدخال اسم الطالب");
    return;
  }

  fetch(jsonURL)
    .then(res => res.json())
    .then(data => {

      const student = data.find(s =>
        s["الاسم"] === name && s["الصف"] === className
      );

      if(!student) {
        document.getElementById('results-container').innerHTML =
          "<p>لم يتم العثور على الطالب</p>";
        return;
      }

      // 🔥 جدول تلقائي كامل
      const keys = Object.keys(student);

      let table = `<h2>نتيجة الطالب: ${student["الاسم"]}</h2>`;
      table += '<table>';

      table += '<tr>';
      keys.forEach(k => table += `<th>${k}</th>`);
      table += '</tr>';

      table += '<tr>';
      keys.forEach(k => table += `<td>${student[k]}</td>`);
      table += '</tr>';

      table += '</table>';

      document.getElementById('results-container').innerHTML = table;

    });

}
</script>

</body>
</html>
