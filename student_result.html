<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعلام عن نتيجة الطالب</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal,sans-serif;}
body{background: linear-gradient(to bottom, #F4F6F7, #D9E2EC); text-align:center;}
header{background:#1A374D;color:white;padding:50px 20px 20px 20px;position:relative;box-shadow:0 4px 8px rgba(0,0,0,0.2);}
header h1{font-size:26px;margin-top:20px;text-shadow:1px 1px 3px rgba(0,0,0,0.3);}
.exit-btn{position:absolute;right:20px;top:20px;padding:5px 12px;background:#e53935;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:all 0.3s ease;}
.exit-btn:hover{background:#b71c1c; transform:scale(1.05);}
.container{padding:30px 20px; display:flex; flex-direction:column; align-items:center; animation:fadeIn 1s ease;}
table{width:100%;border-collapse:collapse;margin-top:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
th,td{border:1px solid #1A374D;padding:8px;text-align:center; transition: all 0.3s ease;}
th{background:#1A374D;color:white;}
tr:nth-child(even){background:#f2f2f2;}
tr:hover{background:#e3f2fd; transform:scale(1.01);}
label{display:block;margin-top:15px;font-weight:bold;}
input, select{padding:10px;margin-top:5px;width:80%;max-width:300px;border-radius:8px;border:1px solid #ccc; transition:all 0.3s ease;}
input:focus, select:focus{border-color:#1A374D; box-shadow:0 0 5px rgba(26,55,77,0.5);}
button.submit-btn{padding:12px 25px;margin-top:15px;background: linear-gradient(120deg, #1A374D, #162b45); color:white;border:none;border-radius:12px;cursor:pointer;font-weight:bold; box-shadow:0 6px 15px rgba(0,0,0,0.3); transition:all 0.3s ease;}
button.submit-btn:hover{background: linear-gradient(120deg, #162b45, #1A374D); transform:scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,0.4);}
@keyframes fadeIn{0%{opacity:0; transform:translateY(-20px);}100%{opacity:1; transform:translateY(0);}}
</style>
</head>
<body>

<header>
<h1>استعلام عن نتيجة الطالب</h1>
<button class="exit-btn" onclick="window.history.back()">رجوع</button>
</header>

<div class="container">
  <label>اختر الصف:</label>
  <select id="classSelect">
    <option value="الروضة">الروضة</option>
    <option value="الأول">الأول</option>
    <option value="الثاني">الثاني</option>
    <option value="الثالث">الثالث</option>
    <option value="الرابع">الرابع</option>
    <option value="الخامس">الخامس</option>
    <option value="السادس">السادس</option>
    <option value="السابع">السابع</option>
    <option value="الثامن">الثامن</option>
    <option value="التاسع">التاسع</option>
    <option value="الثانوي الأول">الثانوي الأول</option>
    <option value="الثانوي الثاني">الثانوي الثاني</option>
    <option value="الثانوي الثالث">الثانوي الثالث</option>
  </select>

  <label>أدخل اسم الطالب:</label>
  <input type="text" id="studentName" placeholder="أدخل الاسم بالكامل">

  <button class="submit-btn" onclick="getStudentResult()">عرض النتيجة</button>
</div>

<div class="container" id="results-container"></div>

<script>
const sheetdbURL = "https://sheetdb.io/api/v1/02e2xbzaprgol"; // رابط SheetDB

function getStudentResult() {
  const name = document.getElementById('studentName').value.trim();
  const className = document.getElementById('classSelect').value;

  if(name === "") {
    alert("الرجاء إدخال اسم الطالب");
    return;
  }

  fetch(sheetdbURL)
    .then(response => response.json())
    .then(data => {
      // تصفية الطالب حسب الاسم والصف
      const student = data.find(s => s.الاسم === name && s.الصف === className);

      if(!student) {
        document.getElementById('results-container').innerHTML = "<p>لم يتم العثور على الطالب في هذا الصف</p>";
        return;
      }

      // أسماء المواد حقيقية
      const subjects = ['رياضيات','فيزياء','كيمياء','أحياء','لغة عربية','لغة إنجليزية','تاريخ','جغرافيا','علوم اجتماعية'];

      // إنشاء الجدول
      let table = '<h2>نتيجة الطالب: '+student.الاسم+'</h2>';
      table += '<table>';
      table += '<tr><th>الاسم</th><th>الصف</th>';
      subjects.forEach(sub => { if(student[sub] !== undefined) table += '<th>'+sub+'</th>'; });
      table += '<th>المعدل</th><th>النتيجة</th></tr>';

      table += '<tr><td>'+student.الاسم+'</td><td>'+student.الصف+'</td>';
      subjects.forEach(sub => { if(student[sub] !== undefined) table += '<td>'+student[sub]+'</td>'; });
      table += '<td>'+student.المعدل+'</td><td>'+student.النتيجة+'</td></tr>';
      table += '</table>';

      document.getElementById('results-container').innerHTML = table;
    });
}
</script>

</body>
</html>
