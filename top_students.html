<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أعلى 10 طلاب</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal,sans-serif;}
body{
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
  text-align:center;
  overflow-x:hidden;
  position:relative;
}
header{
  background:#1A374D;
  color:white;
  padding:50px 20px 20px 20px;
  position:relative;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
header h1{
  font-size:26px;
  margin-top:20px;
  text-shadow:1px 1px 3px rgba(0,0,0,0.3);
}
.exit-btn{
  position:absolute;
  right:20px;
  top:20px;
  padding:5px 12px;
  background:#e53935;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:all 0.3s ease;
}
.exit-btn:hover{background:#b71c1c; transform:scale(1.05);}
.container{
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:fadeIn 1s ease;
}
table{
  width:80%;
  max-width:900px;
  border-collapse:collapse;
  margin-top:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
th,td{
  border:1px solid #1A374D;
  padding:10px;
  text-align:center;
  transition:all 0.3s ease;
}
th{
  background:#1A374D;
  color:white;
}
tr:nth-child(even){background:#f2f2f2;}
tr:hover{background:#e3f2fd; transform:scale(1.01);}
@keyframes fadeIn{
  0%{opacity:0; transform:translateY(-20px);}
  100%{opacity:1; transform:translateY(0);}
}

/* تأثير فقاعات احتفالية */
.bubble{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation:rise 5s linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0.5);}
  100%{transform:translateY(-50vh) scale(1);}
}
</style>
</head>
<body>

<header>
<h1>أعلى 10 طلاب</h1>
<button class="exit-btn" onclick="window.history.back()">رجوع</button>
</header>

<div class="container" id="results-container">
  <!-- الجدول فارغ عند البداية -->
  <table>
    <tr>
      <th>الاسم</th>
      <th>الصف</th>
      <th>المعدل</th>
      <th>التقدير</th>
    </tr>
    <!-- لا توجد أي بيانات وهمية -->
  </table>
</div>

<script>
// فقاعات احتفالية عند تحميل الصفحة
function createBubbles(num){
  for(let i=0;i<num;i++){
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    const size = Math.random()*20 + 20;
    bubble.style.width = size+'px';
    bubble.style.height = size+'px';
    bubble.style.left = Math.random()*100+'vw';
    bubble.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    bubble.style.animationDuration = (Math.random()*3+3)+'s';
    document.body.appendChild(bubble);
  }
}

// إنشاء فقاعات احتفالية
createBubbles(15);
</script>

</body>
</html>
