<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أعلى 10 طلاب</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal,sans-serif;}
body{
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
  text-align:center;
  overflow-x:hidden;
  position:relative;
}
header{
  background:#1A374D;
  color:white;
  padding:50px 20px 20px 20px;
  position:relative;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
header h1{font-size:26px;margin-top:20px;}
.exit-btn{
  position:absolute;
  right:20px;
  top:20px;
  padding:5px 12px;
  background:#e53935;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.container{
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
table{
  width:80%;
  max-width:900px;
  border-collapse:collapse;
  margin-top:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
th,td{
  border:1px solid #1A374D;
  padding:10px;
  text-align:center;
}
th{
  background:#1A374D;
  color:white;
}
tr:nth-child(even){background:#f2f2f2;}

/* فقاعات */
.bubble{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation:rise 5s linear infinite;
}
@keyframes rise{
  0%{transform:translateY(100vh) scale(0.5);}
  100%{transform:translateY(-50vh) scale(1);}
}
</style>
</head>

<body>

<header>
<h1>أعلى 10 طلاب</h1>
<button class="exit-btn" onclick="window.history.back()">رجوع</button>
</header>

<div class="container">
  <table id="table">
    <tr>
      <th>الاسم</th>
      <th>الصف</th>
      <th>المعدل</th>
      <th>النتيجة</th>
    </tr>
  </table>
</div>

<script>

const jsonURL = "students.json";

// استخراج الصف من الرابط
const className = new URLSearchParams(window.location.search).get("class");

// جلب البيانات
fetch(jsonURL)
  .then(res => res.json())
  .then(data => {

    let students = data;

    // إذا تم اختيار صف نفلتر
    if(className){
      students = students.filter(s => s["الصف"] === className);
    }

    // ترتيب حسب المعدل (الأعلى أولاً)
    students.sort((a,b) => b["المعدل"] - a["المعدل"]);

    // أخذ أعلى 10
    students = students.slice(0,10);

    const table = document.getElementById("table");

    students.forEach(s => {
      let row = `
        <tr>
          <td>${s["الاسم"]}</td>
          <td>${s["الصف"]}</td>
          <td>${s["المعدل"]}</td>
          <td>${s["النتيجة"]}</td>
        </tr>
      `;
      table.innerHTML += row;
    });

  });

// فقاعات احتفالية
function createBubbles(num){
  for(let i=0;i<num;i++){
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    const size = Math.random()*20 + 20;
    bubble.style.width = size+'px';
    bubble.style.height = size+'px';
    bubble.style.left = Math.random()*100+'vw';
    bubble.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    bubble.style.animationDuration = (Math.random()*3+3)+'s';
    document.body.appendChild(bubble);
  }
}
createBubbles(15);

</script>

</body>
</html>
